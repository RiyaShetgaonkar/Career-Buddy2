<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Buddy | Manage Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',sans-serif; color:#fff; min-height:100vh;
            display:flex; justify-content:center; align-items:center;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364), url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
            background-size:cover; background-position:center; background-attachment: fixed;
            padding: 40px 20px;
        }
        .page-bg { position:fixed; inset:0; background: linear-gradient(rgba(15,32,39,0.85), rgba(15,32,39,0.85)); z-index:-1; }
        .hologram { text-shadow: 0 0 6px rgba(0,255,255,.7), 0 0 20px rgba(0,255,255,.5); }
        .login-container {
            width:100%; max-width:600px; background:rgba(15,32,39,.92);
            backdrop-filter:blur(10px); padding:40px 35px; border-radius:25px;
            box-shadow:0 30px 60px rgba(0,0,0,.6); position:relative;
        }
        .login-container h1 { text-align:center; font-size:2.2rem; margin-bottom:10px; color: #00ffc8; }
        .login-container p.subtitle { text-align:center; opacity:.85; margin-bottom:35px; }
        .form-group { margin-bottom:22px; position:relative; }
        label { display:block; margin-bottom:8px; font-weight:600; font-size:.95rem; color: #00ffc8; }
        .form-group i { position:absolute; top:38px; left:12px; color:#00ffc8; font-size:1.1rem; opacity:.8; }
        input, select, textarea {
            width:100%; padding:14px 14px 14px 38px; border-radius:12px;
            border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.05);
            color:#fff; font-size:1rem; outline:none; transition:.3s;
        }
        .view-mode input, .view-mode select, .view-mode textarea {
            border: 1px solid transparent;
            background: rgba(255,255,255,0.02);
            pointer-events: none;
            color: #ddd;
        }
        .buttons { display:flex; gap:15px; margin-top:25px; }
        button { flex:1; padding:14px; border:none; border-radius:14px; font-size:1rem; font-weight:600; cursor:pointer; transition:.3s; }
        .edit-btn { background: #00ffc8; color: #003333; }
        .save-btn { background: linear-gradient(135deg,#31beb2,#00ffc8); color: #003333; display: none; }
        .cancel-btn { background: rgba(255,255,255,0.1); color: #fff; display: none; }
        .back-home { text-align:center; margin-top:20px; }
        .back-home a { color:#ccc; text-decoration:none; }
        select option { background-color: #203a43; color: #ffffff; }
    </style>
</head>
<body>
    <div class="page-bg"></div>

    <div class="login-container view-mode" id="container">
        <h1 class="hologram"><i class="fas fa-user-edit"></i> My Profile</h1>
        <p class="subtitle" id="status-text">Viewing your saved information</p>

        <form id="detailsForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <label>Full Name</label>
                <input type="text" id="fullName" name="data[Name]" required>
            </div>

            <div class="form-group">
                <i class="fas fa-graduation-cap"></i>
                <label>Degree</label>
                <select name="data[Degree]" id="degreeSelect" required>
                    <option value="">--Select Degree--</option>
                    <option value="BCA">BCA</option>
                    <option value="BE">BE</option>
                    <option value="BBA">BBA</option>
                    <option value="BCOM">BCom</option>
                    <option value="BSC">BSc</option>
                    <option value="BED">B.Ed</option>
                </select>
            </div>

            <div class="form-group">
                <i class="fas fa-code"></i>
                <label>Branch / Specialization</label>
                <select name="data[Branch / Specialization]" id="branchSelect" required>
                    <option value="">--Select branch--</option>
                </select>
            </div>

            <div class="form-group">
                <i class="fas fa-layer-group"></i>
                <label>Year of Study</label>
                <select id="year" name="data[Year]" required>
                    <option value="1st Year">1st Year</option>
                    <option value="2nd Year">2nd Year</option>
                    <option value="3rd Year">3rd Year</option>
                    <option value="4th Year">4th Year</option>
                </select>
            </div>

            <div class="form-group"><i class="fas fa-phone"></i><label>Phone</label><input type="tel" id="phone" name="data[Phone Number]" required></div>
            <div class="form-group"><i class="fas fa-calendar-alt"></i><label>DOB</label><input type="date" id="dob" name="data[Date of Birth]" required></div>
            <div class="form-group"><i class="fas fa-school"></i><label>College</label><input type="text" id="college" name="data[College / University Name]" required></div>
            <div class="form-group"><i class="fas fa-star"></i><label>CGPA</label><input type="text" id="cgpa" name="data[CGPA / Percentage]" required></div>
            <div class="form-group"><i class="fas fa-map-marker-alt"></i><label>State</label><input type="text" id="state" name="data[State]" required></div>
            <div class="form-group"><i class="fas fa-lightbulb"></i><label>Skills</label><textarea id="skills" name="data[Skills]" rows="3" required></textarea></div>

            <div class="buttons">
                <button type="button" class="edit-btn" id="editBtn" onclick="toggleEdit(true)"><i class="fas fa-edit"></i> Edit Details</button>
                <button type="submit" class="save-btn" id="saveBtn"><i class="fas fa-save"></i> Save Changes</button>
                <button type="button" class="cancel-btn" id="cancelBtn" onclick="toggleEdit(false)">Cancel</button>
            </div>

            <div class="back-home"><a href="main.html">← Back to Dashboard</a></div>
        </form>
    </div>

    <script>
        const branches = {
            BCA: ["Computer Applications", "Software Development", "Web Development", "Data Science", "Cyber Security", "Cloud Computing"],
            BE: ["Computer Science Engineering", "Information Technology", "Artificial Intelligence & ML", "Electronics & Communication", "Electrical Engineering", "Mechanical Engineering", "Civil Engineering"],
            BBA: ["General Management", "Finance", "Marketing", "Human Resource Management", "International Business", "Business Analytics"],
            BCOM: ["General Commerce", "Accounting & Finance", "Banking & Insurance", "Taxation", "Corporate Secretaryship"],
            BSC: ["Computer Science", "Information Technology", "Mathematics", "Physics", "Chemistry", "Biotechnology", "Microbiology"],
            BED: ["English", "Mathematics", "Science", "Social Science", "Special Education"]
        };

        const degreeSelect = document.getElementById("degreeSelect");
        const branchSelect = document.getElementById("branchSelect");

        function updateBranchOptions(selectedDegree, selectedBranch = "") {
            branchSelect.innerHTML = '<option value="">--Select branch--</option>';
            if (branches[selectedDegree]) {
                branches[selectedDegree].forEach(branch => {
                    const option = document.createElement("option");
                    option.value = branch;
                    option.textContent = branch;
                    if (branch === selectedBranch) option.selected = true;
                    branchSelect.appendChild(option);
                });
            }
        }

        degreeSelect.addEventListener("change", (e) => updateBranchOptions(e.target.value));

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/getUserDetails');
                const data = await res.json();

                document.getElementById('fullName').value = data.fullName || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('dob').value = data.dob || '';
                document.getElementById('college').value = data.college || '';
                document.getElementById('cgpa').value = data.cgpa || '';
                document.getElementById('state').value = data.state || '';
                document.getElementById('skills').value = (data.skills || []).join(', ');

                // Key fix: Matches 'year' lowercase from app.js payload
                if (data.year) {
                    document.getElementById('year').value = data.year;
                }

                if (data.degree) {
                    degreeSelect.value = data.degree;
                    // Critical: populate options FIRST, then the value will stick
                    updateBranchOptions(data.degree, data.branch);
                }
            } catch (err) { 
                console.error("Error loading data:", err);
            }
        });

        function toggleEdit(isEditing) {
            const container = document.getElementById('container');
            document.getElementById('editBtn').style.display = isEditing ? 'none' : 'block';
            document.getElementById('saveBtn').style.display = isEditing ? 'block' : 'none';
            document.getElementById('cancelBtn').style.display = isEditing ? 'block' : 'none';
            if (isEditing) {
                container.classList.remove('view-mode');
                document.getElementById('status-text').innerText = "Editing your information";
            } else {
                location.reload();
            }
        }

        document.getElementById('detailsForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    // Force values from elements to ensure nothing is missed
    const payload = {
        "data[Name]": document.getElementById('fullName').value,
        "data[Phone Number]": document.getElementById('phone').value,
        "data[Date of Birth]": document.getElementById('dob').value,
        "data[College / University Name]": document.getElementById('college').value,
        "data[Degree]": document.getElementById('degreeSelect').value,
        "data[Branch / Specialization]": document.getElementById('branchSelect').value,
        "data[Year]": document.getElementById('year').value, // Matches <select id="year">
        "data[CGPA / Percentage]": document.getElementById('cgpa').value,
        "data[State]": document.getElementById('state').value,
        "data[Skills]": document.getElementById('skills').value
    };

    console.log("DEBUG: Sending payload to server:", payload);

    try {
        const res = await fetch('/updateUserDetails', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        const result = await res.json();

        if (res.ok && result.success) {
            alert("Profile Saved Successfully!");
            // Refresh logic
            window.location.reload(); 
        } else {
            alert("Error saving: " + result.message);
        }
    } catch (err) {
        console.error("Network Error:", err);
        alert("Failed to connect to server.");
    }
});
    </script>
</body>
</html>
