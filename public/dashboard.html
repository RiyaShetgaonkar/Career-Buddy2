<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Career Buddy | Student Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',sans-serif; color:#fff; min-height:100vh;
            display:flex; justify-content:center; align-items:center;
            background: linear-gradient(135deg,#0f2027,#203a43,#2c5364), url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
            background-size:cover; background-position:center;
        }
        .hologram { text-shadow: 0 0 6px rgba(0,255,255,.7), 0 0 20px rgba(0,255,255,.5); }
        .login-container {
            width:100%; max-width:500px; background:rgba(15,32,39,.92);
            backdrop-filter:blur(10px); padding:40px 35px; border-radius:25px;
            box-shadow:0 30px 60px rgba(0,0,0,.6); position:relative; z-index:1;
        }
        .login-container h1 { text-align:center; font-size:2.4rem; margin-bottom:10px; }
        .login-container p { text-align:center; opacity:.85; margin-bottom:35px; }
        .form-group { margin-bottom:22px; position:relative; }
        label { display:block; margin-bottom:8px; font-weight:600; font-size:.95rem; }
        .form-group i { position:absolute; top:38px; left:12px; color:#00ffc8; font-size:1.1rem; opacity:.8; }
        input, select, textarea {
            width:100%; padding:14px 14px 14px 38px; border-radius:12px;
            border:1px solid rgba(255,255,255,.2); background:rgba(255,255,255,.05);
            color:#fff; font-size:1rem; outline:none; transition:.3s;
        }
        input:focus, select:focus, textarea:focus { border-color:#00ffc8; box-shadow:0 0 12px rgba(0,255,200,.5); }
        .buttons { display:flex; gap:15px; margin-top:25px; }
        button { flex:1; padding:14px; border:none; border-radius:14px; font-size:1rem; font-weight:600; cursor:pointer; transition:.3s; }
        .submit-btn { background:linear-gradient(135deg,#31beb2,#00ffc8); color:#003333; }
        .submit-btn:hover { transform:translateY(-3px); box-shadow:0 15px 30px rgba(0,255,200,.4); }
        .reset-btn { background:rgba(255,255,255,.15); color:#fff; }
        .back-home { text-align:center; margin-top:20px; }
        .back-home a { color:#ccc; font-size:.9rem; text-decoration:none; }
        select option { background-color: #203a43; color: #ffffff; }
        .page-bg { position:fixed; inset:0; background: linear-gradient(rgba(15,32,39,0.85), rgba(15,32,39,0.85)), url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d"); background-size:cover; z-index:-1; }
        #detailsModal { position:fixed; inset:0; background:rgba(0,0,0,.7); display:none; justify-content:center; align-items:center; z-index:10; }
        .details-card { background:#0f2027; padding:30px; border-radius:20px; width:90%; max-width:450px; box-shadow:0 0 30px rgba(0,255,255,.4); }
        .skills-box { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
        .skill-chip { background: rgba(0,255,200,0.15); border: 1px solid rgba(0,255,200,0.4); padding: 8px 14px; border-radius: 20px; font-size: 0.85rem; cursor: pointer; transition: 0.25s; }
        .skill-chip input { display: none; }
        .skill-chip.selected { background: #00ffc8; color: #003333; font-weight: 600; }
    </style>

</head>
<body>

    <div class="page-bg"></div>

    <div class="login-container">
        <h1 class="hologram"><i class="fas fa-user-graduate"></i> Student Dashboard</h1>
        <p>Fill in your details below</p>

        <form id="userForm">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <label>Full Name</label>
                <input type="text" name="data[Name]" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <i class="fas fa-phone"></i>
                <label>Phone Number</label>
                <input type="tel" name="data[Phone Number]" placeholder="Enter your phone number" required>
            </div>

            <div class="form-group">
                <i class="fas fa-calendar-alt"></i>
                <label>Date of Birth</label>
                <input type="date" name="data[Date of Birth]" required>
            </div>

            <div class="form-group">
                <i class="fas fa-school"></i>
                <label>College / University Name</label>
                <input type="text" name="data[College / University Name]" placeholder="Enter your college/university" required>
            </div>

            <div class="form-group">
    <i class="fas fa-layer-group"></i>
    <label>Year of Study</label>
    <select name="data[Year of Study]" required>
        <option value="">--Select year--</option>
        <option value="1st Year">1st Year</option>
        <option value="2nd Year">2nd Year</option>
        <option value="3rd Year">3rd Year</option>
        <option value="4th Year">4th Year</option>
    </select>
</div>

            <div class="form-group">
                <i class="fas fa-graduation-cap"></i>
                <label>Degree / Program</label>
                <select name="data[Degree]" id="degreeSelect" required>
                    <option value="">--Select your program--</option>
                    <option value="BCA">BCA</option>
                    <option value="BE">BE</option>
                    <option value="BBA">BBA</option>
                    <option value="BCOM">BCom</option>
                    <option value="BSC">BSc</option>
                    <option value="BED">B.Ed</option>
                </select>
            </div>

            <div class="form-group">
                <i class="fas fa-code"></i>
                <label>Branch / Specialization</label>
                <select name="data[Branch / Specialization]" id="branchSelect" required>
                    <option value="">--Select branch--</option>
                </select>
            </div>

            <div class="form-group">
                <i class="fas fa-percentage"></i>
                <label>CGPA / Percentage</label>
                <input type="text" name="data[CGPA / Percentage]" placeholder="Ex: 8.5" required>
            </div>

            <div class="form-group">
                <i class="fas fa-map-marker-alt"></i>
                <label>State</label>
                <input type="text" name="data[State]" placeholder="Enter your state" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lightbulb"></i>
                <label>Skills</label>
                <div id="skillsContainer" class="skills-box"></div>
            </div>


            <div class="buttons">
                <button type="submit" class="submit-btn"><i class="fas fa-paper-plane"></i> Submit</button>
                <button type="button" class="reset-btn" onclick="viewLocalDetails()"><i class="fas fa-eye"></i> Preview</button>
            </div>

            <div class="back-home">
                <a href="index.html">← Back to Home</a>
            </div>
        </form>
    </div>

    <div id="detailsModal">
        <div class="details-card">
            <h2>Local Preview</h2>
            <div id="modalBody"></div>
            <button onclick="closeDetails()" style="background:#00ffc8; margin-top:10px; color:#000;">Close</button>
        </div>
    </div>
<script>
    const degreeSelect = document.getElementById("degreeSelect");
    const branchSelect = document.getElementById("branchSelect");
    const skillsContainer = document.getElementById("skillsContainer");

    const branches = {
    BCA: [
        "Computer Applications",
        "Software Development",
        "Web Development",
        "Data Science",
        "Cyber Security",
        "Cloud Computing"
    ],

    BE: [
        "Computer Science Engineering",
        "Information Technology",
        "Artificial Intelligence & ML",
        "Electronics & Communication",
        "Electrical Engineering",
        "Mechanical Engineering",
        "Civil Engineering"
    ],

    BBA: [
        "General Management",
        "Finance",
        "Marketing",
        "Human Resource Management",
        "International Business",
        "Business Analytics"
    ],

    BCOM: [
        "General Commerce",
        "Accounting & Finance",
        "Banking & Insurance",
        "Taxation",
        "Corporate Secretaryship"
    ],

    BSC: [
        "Computer Science",
        "Information Technology",
        "Mathematics",
        "Physics",
        "Chemistry",
        "Biotechnology",
        "Microbiology"
    ],

    BED: [
        "English",
        "Mathematics",
        "Science",
        "Social Science",
        "Special Education"
    ]
};

   const skillsMap = {

    // ===== BCA =====
    "BCA|Computer Applications": [
        "computer basics","ms office","problem solving","c","logic building",
        "java","oops","sql","dbms","os","memory management"
    ],

    "BCA|Software Development": [
        "html","css","javascript","react","nodejs","express","mongodb",
        "java","oops","software design","uml","git","version control"
    ],

    "BCA|Web Development": [
        "html","css","javascript","react","nodejs","express",
        "mongodb","api integration","responsive design"
    ],

    "BCA|Data Science": [
        "data analysis","statistics","python","numpy","pandas","matplotlib",
        "seaborn","machine learning","sql","data querying"
    ],

    "BCA|Cyber Security": [
        "network security","ethical hacking","penetration testing",
        "cryptography","linux","firewalls"
    ],

    "BCA|Cloud Computing": [
        "aws","azure","cloud security","docker",
        "kubernetes","devops"
    ],

    // ===== BE =====
    "BE|Computer Science Engineering": [
        "dsa","problem solving","c++","os","process management",
        "sql","dbms","networking","tcp/ip","sdlc","uml"
    ],

    "BE|Information Technology": [
        "html","css","javascript","cloud","aws","cyber security",
        "network security","python","automation","project management","agile"
    ],

    "BE|Artificial Intelligence & ML": [
        "python","machine learning","deep learning",
        "tensorflow","data modeling","nlp"
    ],

    "BE|Electronics & Communication": [
        "embedded systems","vlsi","signal processing",
        "iot","microcontrollers"
    ],

    "BE|Electrical Engineering": [
        "power systems","circuit analysis",
        "transformers","control systems"
    ],

    "BE|Mechanical Engineering": [
        "thermodynamics","energy systems","autocad",
        "design","manufacturing","robotics"
    ],

    "BE|Civil Engineering": [
        "structural analysis","project planning",
        "autocad","soil mechanics","environment"
    ],

    // ===== BBA =====
    "BBA|General Management": [
        "leadership","strategy","communication",
        "operations management"
    ],

    "BBA|Finance": [
        "financial analysis","budgeting","investment banking",
        "excel","financial modeling","risk management"
    ],

    "BBA|Marketing": [
        "digital marketing","seo","branding",
        "market research","social media","consumer psychology"
    ],

    "BBA|Human Resource Management": [
        "recruitment","hr analytics","organizational behavior",
        "performance management","leadership"
    ],

    "BBA|International Business": [
        "global trade","export management",
        "business law","supply chain"
    ],

    "BBA|Business Analytics": [
        "data analysis","excel","power bi",
        "business intelligence"
    ],

    // ===== BCOM =====
    "BCOM|General Commerce": [
        "economics","business law","management",
        "communication","planning"
    ],

    "BCOM|Accounting & Finance": [
        "accounting","financial statements","tally",
        "gst","taxation","costing"
    ],

    "BCOM|Banking & Insurance": [
        "banking operations","risk management",
        "insurance law","financial services"
    ],

    "BCOM|Taxation": [
        "income tax","gst","tax planning",
        "compliance"
    ],

    "BCOM|Corporate Secretaryship": [
        "corporate law","company accounts",
        "compliance","secretarial practice"
    ],

    // ===== BSC =====
    "BSC|Computer Science": [
        "python","algorithms","data structures",
        "dbms","html","css","javascript"
    ],

    "BSC|Information Technology": [
        "networking","web development",
        "cloud computing","cyber security"
    ],

    "BSC|Mathematics": [
        "linear algebra","probability",
        "statistics","matlab"
    ],

    "BSC|Physics": [
        "quantum mechanics","electromagnetism",
        "numerical methods"
    ],

    "BSC|Chemistry": [
        "organic chemistry","analytical chemistry",
        "lab techniques"
    ],

    "BSC|Biotechnology": [
        "genetics","bioprocessing",
        "microbiology"
    ],

    "BSC|Microbiology": [
        "immunology","virology",
        "lab diagnostics"
    ],

    // ===== BED =====
    "BED|English": [
        "grammar","lesson planning",
        "creative writing","digital teaching"
    ],

    "BED|Mathematics": [
        "problem solving","lesson planning",
        "classroom management"
    ],

    "BED|Science": [
        "scientific thinking","experiments",
        "lab operations"
    ],

    "BED|Social Science": [
        "history","geography",
        "civics","lesson planning"
    ],

    "BED|Special Education": [
        "inclusive education","student counseling",
        "behavior analysis"
    ]
};

    degreeSelect.addEventListener("change", () => {
    branchSelect.innerHTML = '<option value="">--Select branch--</option>';
    skillsContainer.innerHTML = "";

    if (branches[degreeSelect.value]) {
        branches[degreeSelect.value].forEach(branch => {
            const opt = document.createElement("option");
            opt.value = branch;
            opt.textContent = branch;
            branchSelect.appendChild(opt);
        });
    }
    });

    branchSelect.addEventListener("change", () => {
        renderSkills();
    });

    function renderSkills(selected = []) {
        skillsContainer.innerHTML = "";
        const key = `${degreeSelect.value}|${branchSelect.value}`;
        const skills = skillsMap[key] || [];

        skills.forEach(skill => {
            const label = document.createElement("label");
            label.className = "skill-chip";

            const input = document.createElement("input");
            input.type = "checkbox";
            input.value = skill;

            if (selected.includes(skill)) {
                input.checked = true;
                label.classList.add("selected");
            }

            input.addEventListener("change", () => {
                label.classList.toggle("selected", input.checked);
            });

            label.appendChild(input);
            label.append(" " + skill);
            skillsContainer.appendChild(label);
        });
    }

    // HANDLE FORM SUBMISSION
    document.getElementById("userForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData(e.target);
    const data = {};

    formData.forEach((value, key) => {
        data[key] = value;
    });

    data["data[Skills]"] = [...document.querySelectorAll("#skillsContainer input:checked")]
        .map(cb => cb.value);

    try {
        const response = await fetch("/updateUserDetails", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.ok && result.success) {
            alert("Profile Saved to Database!");
            window.location.href = result.redirect;
        } else {
            alert("Error: " + (result.message || "Update failed"));
        }
    } catch (err) {
        console.error("Submission error:", err);
        alert("Server connection failed.");
    }
    });


    // Preview Function
    function viewLocalDetails() {
        const formData = new FormData(document.getElementById("userForm"));
        let html = "";
        formData.forEach((v, k) => {
            // Clean up the label for the preview modal
            const cleanLabel = k.replace('data[', '').replace(']', '');
            if(v) html += `<p><b>${cleanLabel}:</b> ${v}</p>`;
        });
        document.getElementById("modalBody").innerHTML = html || "No data entered yet.";
        document.getElementById("detailsModal").style.display = "flex";
    }

    function closeDetails() {
        document.getElementById("detailsModal").style.display = "none";
    }
</script>

  
</body>
</html>
