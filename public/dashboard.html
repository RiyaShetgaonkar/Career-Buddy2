<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Career Buddy | Student Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI',sans-serif;
  color:#fff;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;

  background:
    linear-gradient(135deg,#0f2027,#203a43,#2c5364),
    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
  background-size:cover;
  background-position:center;
}

/* HOLOGRAM TEXT */
.hologram{
  text-shadow:
    0 0 6px rgba(0,255,255,.7),
    0 0 20px rgba(0,255,255,.5);
}

/* FORM CONTAINER */
.login-container{
  width:100%;
  max-width:500px;
  background:rgba(15,32,39,.92);
  backdrop-filter:blur(10px);
  padding:40px 35px;
  border-radius:25px;
  box-shadow:0 30px 60px rgba(0,0,0,.6);
  position:relative;
  z-index:1;
}

/* TITLE */
.login-container h1{
  text-align:center;
  font-size:2.4rem;
  margin-bottom:10px;
}

.login-container p{
  text-align:center;
  opacity:.85;
  margin-bottom:35px;
}

/* FORM GROUP */
.form-group{
  margin-bottom:22px;
  position:relative;
}

label{
  display:block;
  margin-bottom:8px;
  font-weight:600;
  font-size:.95rem;
}

/* ICONS */
.form-group i{
  position:absolute;
  top:38px;
  left:12px;
  color:#00ffc8;
  font-size:1.1rem;
  opacity:.8;
}

/* INPUTS */
input, select, textarea{
  width:100%;
  padding:14px 14px 14px 38px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.05);
  color:#fff;
  font-size:1rem;
  outline:none;
  transition:.3s;
}

input::placeholder, textarea::placeholder{
  color:#ddd;
}

input:focus, select:focus, textarea:focus{
  border-color:#00ffc8;
  box-shadow:0 0 12px rgba(0,255,200,.5);
}

/* TEXTAREA */
textarea{
  padding:14px 14px 14px 38px;
  resize:vertical;
}

/* BUTTONS */
.buttons{
  display:flex;
  gap:15px;
  margin-top:25px;
}

button{
  flex:1;
  padding:14px;
  border:none;
  border-radius:14px;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.submit-btn{
  background:linear-gradient(135deg,#31beb2,#00ffc8);
  color:#003333;
}

.submit-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 15px 30px rgba(0,255,200,.4);
}

.reset-btn{
  background:rgba(255,255,255,.15);
  color:#fff;
}

.reset-btn:hover{
  background:rgba(255,255,255,.3);
}

/* BACK HOME */
.back-home{
  text-align:center;
  margin-top:20px;
}

.back-home a{
  color:#ccc;
  font-size:.9rem;
  text-decoration:none;
}

.back-home a:hover{
  color:#00ffc8;
}

select option {
  background-color: #203a43;
  color: #ffffff;
}

select optgroup {
  background-color: #203a43;
  color: #00ffc8;
}
.page-bg{
  position:fixed;
  inset:0;
  background:
    linear-gradient(
      rgba(15,32,39,0.85),
      rgba(15,32,39,0.85)
    ),
    url("https://images.unsplash.com/photo-1521737604893-d14cc237f11d");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
  z-index:-1;
}
/* DETAILS MODAL */
#detailsModal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:10;
}

.details-card{
  background:#0f2027;
  padding:30px;
  border-radius:20px;
  width:90%;
  max-width:450px;
  box-shadow:0 0 30px rgba(0,255,255,.4);
}

.details-card h2{
  color:#00ffc8;
  margin-bottom:15px;
}

.details-card p{
  margin:8px 0;
}

.details-card button{
  margin-top:15px;
  padding:10px;
  width:100%;
  background:#00ffc8;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}


</style>
</head>

<body>
  <div class="page-bg"></div>


<div class="login-container">
  <h1 class="hologram"><i class="fas fa-user-graduate"></i> Student Dashboard</h1>
  <p>Fill in your details below</p>

  <form id="userForm" action="/updateUserDetails" method="POST">
    <!-- HIDDEN USERNAME FIELD -->
    <input type="hidden" name="username" value="USERNAME_HERE">

    <div class="form-group">
      <i class="fas fa-user"></i>
      <label>Full Name</label>
      <input type="text" name="data[Name]" placeholder="Enter your full name" required>
    </div>

    <div class="form-group">
      <i class="fas fa-phone"></i>
      <label>Phone Number</label>
      <input type="tel" name="data[Phone Number]" placeholder="Enter your phone number" required>
    </div>

    <div class="form-group">
      <i class="fas fa-calendar-alt"></i>
      <label>Date of Birth</label>
      <input type="date" name="data[Date of Birth]" required>
    </div>

    <div class="form-group">
      <i class="fas fa-school"></i>
      <label>College / University Name</label>
      <input type="text" name="data[College / University Name]" placeholder="Enter your college/university" required>
    </div>
    
<div class="form-group">
  <i class="fas fa-layer-group"></i>
  <label>Year of Study</label>
  <select name="data[Year of Study]" required>
    <option value="">--Select year--</option>
    <option value="1st Year">1st Year</option>
    <option value="2nd Year">2nd Year</option>
    <option value="3rd Year">3rd Year</option>
    <option value="4th Year">4th Year</option>
 
  </select>
</div>

    <div class="form-group">
      <i class="fas fa-graduation-cap"></i>
      <label>Degree / Program</label>
      <select name="data[Degree]" id="degreeSelect" required>
  <option value="">--Select your program--</option>
  <option value="BCA">BCA</option>
  <option value="BE">BE</option>
  <option value="BBA">BBA</option>
  <option value="BCOM">BCom</option>
  <option value="BSC">BSc</option>
  <option value="BED">B.Ed</option>
</select>

    </div>

    <div class="form-group">
      <i class="fas fa-code"></i>
      <label>Branch / Specialization</label>
<select name="data[Branch / Specialization]" id="branchSelect" required>
  <option value="">--Select branch--</option>
</select>


    </div>
<script>
document.addEventListener("DOMContentLoaded", () => {
  const degreeSelect = document.getElementById("degreeSelect");
  const branchSelect = document.getElementById("branchSelect");

  const branches = {
    BCA: [
      "Computer Applications",
      "Software Development",
      "Web Development",
      "Data Science",
      "Cyber Security",
      "Cloud Computing"
    ],
    BE: [
      "Computer Science Engineering",
      "Information Technology",
      "Artificial Intelligence & ML",
      "Electronics & Communication",
      "Electrical Engineering",
      "Mechanical Engineering",
      "Civil Engineering"
    ],
    BBA: [
      "General Management",
      "Finance",
      "Marketing",
      "Human Resource Management",
      "International Business",
      "Business Analytics"
    ],
    BCOM: [
      "General Commerce",
      "Accounting & Finance",
      "Banking & Insurance",
      "Taxation",
      "Corporate Secretaryship"
    ],
    BSC: [
      "Computer Science",
      "Information Technology",
      "Mathematics",
      "Physics",
      "Chemistry",
      "Biotechnology",
      "Microbiology"
    ],
    BED: [
      "English",
      "Mathematics",
      "Science",
      "Social Science",
      "Special Education"
    ]
  };

  degreeSelect.addEventListener("change", () => {
    const selectedDegree = degreeSelect.value;

    // Reset branches
    branchSelect.innerHTML = '<option value="">--Select branch--</option>';

    if (branches[selectedDegree]) {
      branches[selectedDegree].forEach(branch => {
        const option = document.createElement("option");
        option.value = branch;
        option.textContent = branch;
        branchSelect.appendChild(option);
      });
    }
  });
});
</script>


    <div class="form-group">
      <i class="fas fa-percentage"></i>
      <label>CGPA / Percentage</label>
      <input type="text" name="data[CGPA / Percentage]" placeholder="Ex: 8.5 / 85%" required>
    </div>

    <div class="form-group">
      <i class="fas fa-map-marker-alt"></i>
      <label>State</label>
      <input type="text" name="data[State]" placeholder="Enter your state" required>
    </div>

    <div class="form-group">
      <i class="fas fa-lightbulb"></i>
      <label>Skills</label>
      <textarea name="data[Skills]" placeholder="Mention your skills" rows="3" required></textarea>
    </div>

   <div class="buttons">
  <button type="submit" class="submit-btn">
    <i class="fas fa-paper-plane"></i> Submit
  </button>

  <button type="button" class="reset-btn" onclick="viewDetails()">
    <i class="fas fa-eye"></i> View Details
  </button>
</div>


    <div class="back-home">
      <a href="index.html">← Back to Home</a>
    </div>
  </form>

</div>
<!-- VIEW DETAILS MODAL -->
<div id="detailsModal">
  <div class="details-card">
    <h2>My Details</h2>
    <p><b>Name:</b> <span id="d-name"></span></p>
    <p><b>Phone:</b> <span id="d-phone"></span></p>
    <p><b>DOB:</b> <span id="d-dob"></span></p>
    <p><b>College:</b> <span id="d-college"></span></p>
    <p><b>Year:</b> <span id="d-year"></span></p>
    <p><b>Degree:</b> <span id="d-degree"></span></p>
    <p><b>Branch:</b> <span id="d-branch"></span></p>
    <p><b>CGPA:</b> <span id="d-cgpa"></span></p>
    <p><b>State:</b> <span id="d-state"></span></p>
    <p><b>Skills:</b> <span id="d-skills"></span></p>

    <button onclick="closeDetails()">Close</button>
  </div>
</div>

<script>
document.getElementById("userForm").addEventListener("submit", (e) => {
  e.preventDefault();

  const formData = new FormData(e.target);
  const data = {};

  formData.forEach((v, k) => data[k] = v);

  localStorage.setItem("studentData", JSON.stringify(data));
  alert("Details saved successfully!");
});

function viewDetails(){
  const data = JSON.parse(localStorage.getItem("studentData"));
  if(!data){
    alert("No details found. Please submit first.");
    return;
  }

  document.getElementById("d-name").textContent = data["data[Name]"];
  document.getElementById("d-phone").textContent = data["data[Phone Number]"];
  document.getElementById("d-dob").textContent = data["data[Date of Birth]"];
  document.getElementById("d-college").textContent = data["data[College / University Name]"];
  document.getElementById("d-year").textContent = data["data[Year of Study]"];
  document.getElementById("d-degree").textContent = data["data[Degree]"];
  document.getElementById("d-branch").textContent = data["data[Branch / Specialization]"];
  document.getElementById("d-cgpa").textContent = data["data[CGPA / Percentage]"];
  document.getElementById("d-state").textContent = data["data[State]"];
  document.getElementById("d-skills").textContent = data["data[Skills]"];

  document.getElementById("detailsModal").style.display="flex";
}

function closeDetails(){
  document.getElementById("detailsModal").style.display="none";
}
</script>



</body>
</html>
